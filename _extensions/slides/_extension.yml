title: Quarto Clean Theme (Slides)
author: Kazuharu Yanagimoto
version: 0.4.2
quarto-required: ">=1.7.33"
contributes:
  format:
    typst:
      shortcodes:
        - shortcodes.lua
      filters:
        - custom.lua
        - typst-environment.lua
        - revealjs.lua
      template-partials:
        - typst-template.typ
        - typst-show.typ
      keep-typ: false
      shift-heading-levels: 0
      citeproc: true
      link-citation: true
      csl: ieee-with-url.csl